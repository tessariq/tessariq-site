<script>
// Replace navbar-brand text with the canonical SVG lockups.
(function() {
  var brand = document.querySelector('.navbar-brand');
  if (!brand) return;
  brand.setAttribute('aria-label', 'Tessariq');
  brand.innerHTML =
    '<img class="tq-brand-lockup tq-brand-lockup--petrol-light" src="/logo/lockup-horizontal-petrol-light.svg" alt="" aria-hidden="true" width="112" height="24">' +
    '<img class="tq-brand-lockup tq-brand-lockup--petrol-dark" src="/logo/lockup-horizontal-petrol-dark.svg" alt="" aria-hidden="true" width="112" height="24">' +
    '<img class="tq-brand-lockup tq-brand-lockup--mono-dark" src="/logo/lockup-horizontal-mono-dark.svg" alt="" aria-hidden="true" width="112" height="24">' +
    '<span class="visually-hidden">Tessariq</span>';
})();

// Nav dark-to-light transition on homepage
// CSS defaults to dark nav on .home pages (no flicker).
// JS adds .tq-nav-light when scrolled past hero to override.
(function() {
  var hero = document.querySelector('.tq-hero');
  if (!hero) return;
  var stickyWrap = document.querySelector('.sticky-top');
  if (!stickyWrap) return;
  var observer = new IntersectionObserver(
    function(entries) {
      entries.forEach(function(entry) {
        if (entry.isIntersecting) {
          stickyWrap.classList.remove('tq-nav-light');
        } else {
          stickyWrap.classList.add('tq-nav-light');
        }
      });
    },
    { threshold: 0, rootMargin: '-56px 0px 0px 0px' }
  );
  observer.observe(hero);
})();
</script>
