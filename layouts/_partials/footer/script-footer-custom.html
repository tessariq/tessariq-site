<script>
// Nav dark-to-light transition on homepage
// CSS defaults to dark nav on .home pages (no flicker).
// JS adds .tq-nav-light when scrolled past hero to override.
(function() {
  var hero = document.querySelector('.tq-hero');
  if (!hero) return;
  var stickyWrap = document.querySelector('.sticky-top');
  if (!stickyWrap) return;
  var observer = new IntersectionObserver(
    function(entries) {
      entries.forEach(function(entry) {
        if (entry.isIntersecting) {
          stickyWrap.classList.remove('tq-nav-light');
        } else {
          stickyWrap.classList.add('tq-nav-light');
        }
      });
    },
    { threshold: 0, rootMargin: '-56px 0px 0px 0px' }
  );
  observer.observe(hero);
})();

// Ensure the mobile offcanvas backdrop is fully removed after dismissing
// the main menu by clicking outside it.
(function() {
  var mainNav = document.getElementById('offcanvasNavMain');
  if (!mainNav) return;
  var mainNavBackdropCycle = 0;

  function hasActiveOffcanvas() {
    return Boolean(document.querySelector('.offcanvas.show, .offcanvas.showing, .offcanvas.hiding'));
  }

  function restoreBootstrapStyle(target, styleProperty, dataAttribute) {
    var elements = typeof target === 'string' ? document.querySelectorAll(target) : [target];

    elements.forEach(function(element) {
      if (!element) return;

      var savedValue = element.getAttribute(dataAttribute);
      if (savedValue === null) {
        element.style.removeProperty(styleProperty);
        return;
      }

      element.style.setProperty(styleProperty, savedValue);
      element.removeAttribute(dataAttribute);
    });
  }

  function cleanupOffcanvasState(expectedCycle) {
    if (expectedCycle !== mainNavBackdropCycle || hasActiveOffcanvas()) return;

    document.querySelectorAll('.offcanvas-backdrop').forEach(function(backdrop) {
      backdrop.remove();
    });

    restoreBootstrapStyle(document.body, 'overflow', 'data-bs-overflow');
    restoreBootstrapStyle(document.body, 'padding-right', 'data-bs-padding-right');
    restoreBootstrapStyle('.fixed-top, .fixed-bottom, .is-fixed, .sticky-top', 'padding-right', 'data-bs-padding-right');
    restoreBootstrapStyle('.sticky-top', 'margin-right', 'data-bs-margin-right');
  }

  mainNav.addEventListener('show.bs.offcanvas', function() {
    mainNavBackdropCycle += 1;
  });

  mainNav.addEventListener('hidden.bs.offcanvas', function() {
    var cleanupCycle = mainNavBackdropCycle;

    window.requestAnimationFrame(function() {
      cleanupOffcanvasState(cleanupCycle);
    });
  });
})();
</script>
