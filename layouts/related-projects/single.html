{{ define "main" }}
<article>
  <div class="row justify-content-center">
    <div class="col-md-12 col-lg-10">
      <div class="blog-header">
        <h1>{{ .Title }}</h1>
      </div>
    </div>
    <div class="col-md-12 col-lg-9">
      {{ with .Params.summary -}}<p class="lead">{{ . }}</p>{{ end -}}
      {{ .Content }}
    </div>
  </div>
</article>
{{ end }}
