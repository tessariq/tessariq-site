{{ define "main" }}
<div class="row justify-content-center">
  <div class="col-md-12 col-lg-10 col-xl-8">
    <article class="tq-manifesto">
      <header class="tq-manifesto-header">
        <div class="tq-manifesto-label">Manifesto</div>
        <h1>{{ .Title }}</h1>
        {{ with .Params.lead }}<p class="tq-manifesto-lead">{{ . }}</p>{{ end }}
      </header>
      {{ with .Content }}<div class="tq-manifesto-body">{{ . }}</div>{{ end }}
    </article>
  </div>
</div>
{{ end }}
